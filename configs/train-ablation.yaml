# configs/train-ablation.yaml
#
# Ablation study configurations.  Each YAML document defines an
# independent experiment that disables one core model component at a time
# (PISS consistency, JK aggregation, residual connections, virtual node)
# to measure its contribution.  The ablation_grid is decoupled from the
# data definition.
#
# NOTE: This file contains multiple YAML documents (separated by ---).
#       Select the appropriate document for your experiment.

# ---------------------------------------------------------------------------
#  Document 1 — Broad node-count ranges (20–1900, all generators)
# ---------------------------------------------------------------------------

master_data_root: "/root/autodl-tmp/split"

base_config:
  run_control: { seed: 42, device: "cuda", num_runs: 5, use_tqdm: false }
  model: { feature_dim: 3, input_dim: 7, hidden_dim: 128, num_layers: 5, dropout: 0.2, jk_type: "lstm", use_virtual_node: true, use_residual: true, activation_fn: 'gelu' }
  training: { epochs: 200, batch_size: 128, num_workers: 8, lr: 0.001, l2_reg: 0.0001, use_lr_scheduler: true, warmup_epochs: 10, min_lr: 1.0e-05, eval_steps: 1, monitor_metric: "mae", early_stop_patience: 40 }
  piss: { consistency_lambda: 0.2, piss_k: 1 }
  dataset: { rebuild_cache: false }
  output: { output_dir: "outputs/", model_dir: "models/" }

experiments:
  - name: "Core_Component_Ablation_Large_Combined"
    dataset:
      type: dynamic_source
      instances:
        - mix_id: "300-600-REDDIT"
          sources:
            - base_dirs: ["REDDIT"]
              generators: ["REDDIT"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "20-200-LBWE"
          sources:
            - base_dirs: ["20-40", "40-100", "100", "200"]
              generators: ["LFR", "ER", "BA", "WS"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "300-600-LBWE"
          sources:
            - base_dirs: ["300", "400", "500", "600"]
              generators: ["LFR", "ER", "BA", "WS"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "20-40-LBWE"
          sources:
            - base_dirs: ["20-40"]
              generators: ["LFR", "ER", "BA", "WS"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "40-100-LBWE"
          sources:
            - base_dirs: ["40-100"]
              generators: ["LFR", "ER", "BA", "WS"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "20-100-LBWE"
          sources:
            - base_dirs: ["20-40", "40-100"]
              generators: ["LFR", "ER", "BA", "WS"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        # - mix_id: "700-1000-LBWE"
        #   sources:
        #     - base_dirs: ["700", "800", "900", "1000"]
        #       generators: ["LFR", "ER", "BA", "WS"]
        #       sampling: { train: 99999, val: 99999, test: 99999 }
        # - mix_id: "1100-1900-LBWE"
        #   sources:
        #     - base_dirs: ["1100", "1200", "1300", "1400", "1500", "1600", "1700", "1800", "1900"]
        #       generators: ["LFR", "ER", "BA", "WS"]
        #       sampling: { train: 99999, val: 99999, test: 99999 }

      templates:
        temp_data_dir: "temp_data/ablation_{mix_id}"
        dataset.cache_path: "cache/ablation_{mix_id}"

    ablation_grid:
      piss.consistency_lambda: [0]
      model.jk_type: ["last"]
      model.use_residual: ["false"]
      model.use_virtual_node: ["false"]

