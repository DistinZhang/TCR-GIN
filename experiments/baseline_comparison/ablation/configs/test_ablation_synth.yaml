# TCR-GIN/experiments/baseline_comparison/ablation/configs/test_ablation_synth.yaml

base_config:
  global_settings:
    output_dir: 'experiments/baseline_comparison/ablation/results'
    output_filename: 'test_ablation_synth.csv'
    datasets_root_dir: '/root/autodl-tmp/split/'
    models_root_dir: 'models/'
    device: 'auto'

  sampling:
    test_limit: -1

  model_params:
    feature_dim: 3
    input_dim: 7
    hidden_dim: 128
    num_layers: 5
    dropout: 0.2
    use_residual: true
    jk_type: "lstm"
    use_virtual_node: true
    activation_fn: 'gelu'

experiments:
  - name: "Ablation Test Group"
    templates:
      m_path: "ablation-models/{mix_id}"
      d_path: "{scale}/{generator}-{scale}/test"

    instances:
      - mix_id: "20-200-LBWE"
        source_scales: ["20-40", "40-100", "100", "200"]
        source_generators: ["LFR", "ER", "BA", "WS"]

      - mix_id: "300-600-LBWE"
        source_scales: ["300", "400", "500", "600"]
        source_generators: ["LFR", "ER", "BA", "WS"]

      - mix_id: "700-1000-LBWE"
        source_scales: ["700", "800", "900", "1000"]
        source_generators: ["LFR", "ER", "BA", "WS"]

      - mix_id: "1100-1900-LBWE"
        source_scales: ["1100", "1200", "1300", "1400", "1500", "1600", "1700", "1800", "1900"]
        source_generators: ["LFR", "ER", "BA", "WS"]

# Run:
# python experiments/baseline_comparison/ablation/test_ablation.py \
#   --config experiments/baseline_comparison/ablation/configs/test_ablation_synth.yaml
