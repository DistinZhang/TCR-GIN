
base_config:
  global_settings:
    output_dir: 'experiments/baseline_comparison/exact_comparison/results'
    output_filename: 'result_observ.csv'
    baselines_root_dir: '/root/autodl-tmp/split-exact/'
    datasets_root_dir: '/root/autodl-tmp/split-exact/'
    models_root_dir: 'experiments/baseline_comparison/exact_comparison/models/'
    device: 'cpu'
  
  sampling:
    test_limit: -1

  feature_dim: 3
  model_params:
    num_layers: 5
    hidden_dim: 128
    dropout: 0.2
    jk_type: 'lstm'
    use_virtual_node: true
    use_residual: true
    activation_fn: 'gelu'

experiments:
  - name: "Multi_Source_Model_Tests"
    instances:
      - mix_id: "20-40-LBWE-exact"
        source_scales: ["20-40"]
        source_generators: ["LFR", "ER", "BA", "WS"]

    templates:
      m_path: "multisource-exact-models/{mix_id}"
      d_path: "{scale}/{generator}-{scale}/test"
      job_name: "multisource-LBWE-{mix_id}"
