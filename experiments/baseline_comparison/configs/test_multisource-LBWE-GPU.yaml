# TI-GIN/experiments/baseline_comparison/configs/test_multisource.yaml

base_config:
  global_settings:
    output_dir: 'experiments/baseline_comparison/results'
    output_filename: 'result_multisource-LBWE-GPU.csv'
    baselines_root_dir: '/root/autodl-tmp/data_synth/'
    datasets_root_dir: '/root/autodl-tmp/split/'
    models_root_dir: 'models/'
    device: 'auto'
  
  # Global default sampling settings
  sampling:
    test_limit: -1

  feature_dim: 3
  model_params:
    num_layers: 5
    hidden_dim: 128
    dropout: 0.2
    jk_type: 'lstm'
    use_virtual_node: true
    use_residual: true
    activation_fn: 'gelu'

experiments:
  - name: "Multi_Source_Model_Tests"
    instances:
      - mix_id: "20-200-LBWE"
        source_scales: ["20-40", "40-100", "100", "200"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "300-600-LBWE"
        source_scales: ["300", "400", "500", "600"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "700-1000-LBWE"
        source_scales: ["700", "800", "900", "1000"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "1100-1900-LBWE"
        source_scales: ["1100", "1200", "1300", "1400", "1500", "1600", "1700", "1800", "1900"]
        source_generators: ["LFR", "ER", "BA", "WS"]
        
    templates:
      m_path: "multisource-models/{mix_id}"
      d_path: "{scale}/{generator}-{scale}/test"
      job_name: "multisource-MIX-{mix_id}"
