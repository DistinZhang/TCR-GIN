# TI-GIN/experiments/baseline_comparison/configs/test_multisource.yaml

base_config:
  global_settings:
    output_dir: 'experiments/baseline_comparison/results'
    output_filename: 'result_multisource-LBWE-CPU-time.csv'
    baselines_root_dir: '/root/autodl-tmp/data_synth/'
    datasets_root_dir: '/root/autodl-tmp/split/'
    models_root_dir: 'models/'
    device: 'cpu'
  
  # Global default sampling settings
  sampling:
    test_limit: -1

  feature_dim: 3
  model_params:
    num_layers: 5
    hidden_dim: 128
    dropout: 0.2
    jk_type: 'lstm'
    use_virtual_node: true
    use_residual: true
    activation_fn: 'gelu'

experiments:
  - name: "Multi_Source_Model_Tests"
    instances:
      - mix_id: "20-200-LBWE"
        source_scales: ["20-40", "40-100"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "20-200-LBWE"
        source_scales: ["100"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "20-200-LBWE"
        source_scales: ["200"]
        source_generators: ["LFR", "ER", "BA", "WS"]

      - mix_id: "300-600-LBWE"
        source_scales: ["300"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "300-600-LBWE"
        source_scales: ["400"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "300-600-LBWE"
        source_scales: ["500"]
        source_generators: ["LFR", "ER", "BA", "WS"]
      - mix_id: "300-600-LBWE"
        source_scales: ["600"]
        source_generators: ["LFR", "ER", "BA", "WS"]

        
      - mix_id: "700-1000-LBWE"
        source_scales: ["700"]
        source_generators: ["LFR", "ER", "BA", "WS"]
