master_data_root: "/root/autodl-tmp/split_588"

base_config:
  run_control: { seed: 42, device: "cuda", num_runs: 1, use_tqdm: false }
  model: { feature_dim: 3, input_dim: 7, hidden_dim: 128, num_layers: 5, dropout: 0.2, jk_type: "lstm", use_virtual_node: true, use_residual: true, activation_fn: 'gelu' }
  training: { epochs: 200, batch_size: 32, num_workers: 8, lr: 0.001, l2_reg: 0.0001, use_lr_scheduler: true, warmup_epochs: 10, min_lr: 1.0e-05, eval_steps: 1, monitor_metric: "mae", early_stop_patience: 40, label_scale_factor: 100.0}
  piss: { consistency_lambda: 0.2, piss_k: 1 }
  dataset: { rebuild_cache: false }
  output: { output_dir: "experiments/early_warning/outputs/", model_dir: "experiments/early_warning/models/" }

experiments:
  - name: "Combine_Small_By_DataType"
    dataset:
      type: dynamic_source
      
      instances:
        - mix_id: "900-1100-power+LBWE"
          sources:
            - base_dirs: ["900", "1000", "1100"]
              generators: ["power", "LFR", "BA", "WS", "ER"]
              sampling: { train: 99999, val: 99999, test: 99999 }
        - mix_id: "500-800-power+LBWE"
          sources:
            - base_dirs: ["500", "600", "700", "800"]
              generators: ["power", "LFR", "BA", "WS", "ER"]
              sampling: { train: 99999, val: 99999, test: 99999 }


              
      templates:
        temp_data_dir: "temp_data/multisource_{mix_id}"
        dataset.cache_path: "cache/multisource_{mix_id}"

