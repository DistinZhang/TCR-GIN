
dismantling_data_dir: "/root/autodl-tmp/data_metric/power_353" 
output_dir: "../results/power-353"
dataset_type: "multi-network"
prediction_strategy: "component_aware" 

monotonicity_test:
  tolerance: '1/1176' 

test_type: "single_param" 

model_suite:
  - name: "Base-Model-0-100"
    node_range: [0, 600]
    base_dir: "../models/multisource-353-models/300-500-power+LBWE"
  - name: "Base-Model-0-100"
    node_range: [600, 900]
    base_dir: "../models/multisource-353-models/600-800-power+LBWE"

  - name: "Base-Model-300-600"
    node_range: [900, 1200]
    base_dir: "../models/multisource-353-models/900-1100-power+LBWE"

    
base_model_params:
  num_layers: 5
  hidden_dim: 128
  dropout: 0.2
  jk_type: 'lstm'
  use_virtual_node: True
  use_residual: True
  activation_fn: 'gelu'
  input_dim: 7
  feature_dim: 3

plotting:
  enabled: true
