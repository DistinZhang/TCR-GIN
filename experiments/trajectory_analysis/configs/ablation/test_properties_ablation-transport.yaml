
dismantling_data_dir: "/root/autodl-tmp/data_trajectory/transport" 
output_dir: "../../results/ablation/results-transport+LBWE-ablation"
dataset_type: "multi-network"

prediction_strategy: "component_aware" 

monotonicity_test:
  tolerance: '0.01'  

test_type: "multi_param"

model_suite:
  - name: "Base-Model-0-100"
    node_range: [0, 100]
    base_dir: "../../models/ablation-models/transport/20-100-transport+LBWE"

  - name: "Base-Model-300-600"
    node_range: [100, 400]
    base_dir: "../../models/ablation-models/transport/100-300-transport+LBWE"

base_model_params:
  num_layers: 5
  hidden_dim: 128
  dropout: 0.2
  jk_type: 'lstm'
  use_virtual_node: True
  use_residual: True
  activation_fn: 'gelu'
  consistency_lambda: 0.2
  piss_k: 1
  input_dim: 7
  feature_dim: 3

plotting:
  enabled: false
