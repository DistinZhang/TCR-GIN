
dismantling_data_dir: "/root/autodl-tmp/data_trajectory/ER2000" 
output_dir: "../../results/ablation/results-ER2000+LBWE-ablation"
dataset_type: "multi-network"

prediction_strategy: "component_aware" 

monotonicity_test:
  tolerance: '0.01'  

test_type: "multi_param"

model_suite:
  - name: "Base-Model-0-200"
    node_range: [0, 300]
    base_dir: "../../../../models/ablation-models/20-200-LBWE"

  - name: "Base-Model-300-600"
    node_range: [300, 700]
    base_dir: "../../../../models/ablation-models/300-600-LBWE"

  - name: "Base-Model-700-1100"
    node_range: [700, 1100]
    base_dir: "../../../../models/ablation-models/700-1000-LBWE"
  - name: "Base-Model-1100-2000"
    node_range: [1100, 2000]
    base_dir: "../../../../models/ablation-models/1100-1900-LBWE"
base_model_params:
  num_layers: 5
  hidden_dim: 128
  dropout: 0.2
  jk_type: 'lstm'
  use_virtual_node: True
  use_residual: True
  activation_fn: 'gelu'
  consistency_lambda: 0.2
  piss_k: 1
  input_dim: 7
  feature_dim: 3

plotting:
  enabled: false
