
dismantling_data_dir: "/root/autodl-tmp/data_trajectory/transport" 
output_dir: "../results/results-transport+LBWE"
dataset_type: "multi-network"
prediction_strategy: "component_aware" 

monotonicity_test:
  tolerance: '0.01'  

test_type: "single_param" 

model_suite:
  - name: "Base-Model-0-100"
    node_range: [0, 100]
    base_dir: "../models/multisource-models/transport/20-100-transport+LBWE"

  - name: "Base-Model-300-600"
    node_range: [100, 400]
    base_dir: "../models/multisource-models/transport/100-300-transport+LBWE"

    
base_model_params:
  num_layers: 5
  hidden_dim: 128
  dropout: 0.2
  jk_type: 'lstm'
  use_virtual_node: True
  use_residual: True
  activation_fn: 'gelu'
  input_dim: 7
  feature_dim: 3

plotting:
  enabled: true

