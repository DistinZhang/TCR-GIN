
dismantling_data_dir: "/root/autodl-tmp/data_trajectory/LFR100" 
output_dir: "../results/results-LFR100-LBWE"
dataset_type: "multi-network"
prediction_strategy: "component_aware" 

monotonicity_test:
  tolerance: '1/100'  

test_type: "single_param" 

model_suite:
  - name: "Base-Model-0-40"
    node_range: [0, 40]
    base_dir: "../../../models/multisource-models/20-40-LBWE"

  - name: "Base-Model-40-100"
    node_range: [40, 100]
    base_dir: "../../../models/multisource-models/40-100-LBWE"

    
base_model_params:
  num_layers: 5
  hidden_dim: 128
  dropout: 0.2
  jk_type: 'lstm'
  use_virtual_node: True
  use_residual: True
  activation_fn: 'gelu'
  input_dim: 7
  feature_dim: 3

plotting:
  enabled: true